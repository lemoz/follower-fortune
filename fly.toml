# Fly.io config — NetWorkNetWorth (NWNW)
app = "networknetworth"
primary_region = "sjc"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  # keep one machine warm: avoids cold-start latency stacking up the serial build
  # queue. (Spend caps are durable on the /data volume, so this isn't what
  # protects the budget — it's a latency/UX choice.)
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[mounts]
  source = "data"
  destination = "/data"
